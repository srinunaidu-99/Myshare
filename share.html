<!DOCTYPE html>
<html>
<head>
<title>Quick Share</title>
<link rel="stylesheet"
href="style.css">
</head>
<body>

<div class="card">

<h1>Share Text</h1>

<textarea
id="msg">
</textarea>

<button onclick="sendText()">
Send
</button>

</div>

<script>

async function sendText(){

await fetch(
"http://localhost:5000/api/share/text",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:
msg.value
})
});

alert("Sent");

}

</script>

</body>
</html>
