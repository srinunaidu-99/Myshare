<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyShare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ MyShare</h2>
    <button>Quick Share</button>
    <button>QR Connect</button>
    <button>MyVault</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <h2>Quick Share</h2>

    <!-- ROOM -->
    <div class="card">
      <label>Room Code</label>
      <div class="row">
        <input id="roomCode" placeholder="Enter Code">
        <button onclick="joinRoom()">Join</button>
      </div>
    </div>

    <!-- MESSAGE -->
    <div class="card">
      <label>Message</label>
      <input id="msgInput" placeholder="Type message">
      <button onclick="sendText()">Send</button>
    </div>

    <!-- FILE -->
    <div class="card">
      <label>Send File</label>
      <input type="file" onchange="handleFile(event)">
      <button onclick="sendFile()">Upload</button>
    </div>

    <!-- HISTORY -->
    <div class="card">
      <label>History</label>
      <div id="history"></div>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
