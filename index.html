<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyShare Pro</title>

<link rel="stylesheet" href="style.css">

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>

<div class="app">

    <h1 class="logo">🚀 MyShare</h1>
    <p class="tag">Share anything instantly</p>

    <div class="card">

        <textarea id="textData" placeholder="Type something to share..."></textarea>

        <button onclick="shareText()">⚡ Instant Share</button>

        <button onclick="generateQR()">📷 QR Generate</button>

        <input type="file" id="fileInput" hidden>
        <button onclick="triggerFile()">📁 File Transfer</button>

    </div>

    <div id="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
