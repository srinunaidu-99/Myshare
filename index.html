<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyShare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="logo">🚀 MyShare</h1>

<div class="container">
  
  <textarea id="textInput" placeholder="Type something to share..."></textarea>

  <div class="buttons">
    <button onclick="shareText()">⚡ Instant Share</button>
    <button onclick="generateQR()">📷 QR Generate</button>
  </div>

  <div id="output"></div>
  <canvas id="qrCanvas"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="app.js"></script>

</body>
</html>
