<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io("https://myshare-backend.onrender.com"); // 🔥 change if needed

let currentRoom = "ABCD1234";

// JOIN ROOM
function joinRoom() {
  const code = document.getElementById('roomCode').value.trim().toUpperCase();
  if (!code) return alert("Enter room code");

  currentRoom = code;

  socket.emit("join-room", code);

  document.getElementById('qrRoomCode').textContent = code;
  document.getElementById('qrPageCode').textContent = code;

  alert("Joined room: " + code);
}

// SEND TEXT
function sendText() {
  const msg = document.getElementById('msgInput').value.trim();
  if (!msg) return;

  document.getElementById('msgInput').value = "";

  addMessage("You", msg);

  socket.emit("send-message", {
    room: currentRoom,
    message: msg
  });
}

// RECEIVE TEXT
socket.on("receive-message", (msg) => {
  addMessage("Other", msg);
});

// ADD MESSAGE UI
function addMessage(type, msg) {
  const list = document.getElementById("historyList");

  const div = document.createElement("div");
  div.className = "history-item";

  div.innerHTML = `
    <span class="history-badge badge-text">${type}</span>
    <span class="history-content">${msg}</span>
    <span class="history-time">${new Date().toLocaleTimeString()}</span>
  `;

  list.appendChild(div);
}
</script>
