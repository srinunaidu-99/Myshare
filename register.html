<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">

<h1>Create Account</h1>

<input id="username"
placeholder="Username">

<input id="email"
placeholder="Email">

<input id="password"
type="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

</div>

<script>

async function register(){

await fetch(
"http://localhost:5000/api/auth/register",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:
username.value,
email:
email.value,
password:
password.value
})
});

alert("Registered");

window.location="login.html";

}

</script>

</body>
</html>
